<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointment History</title>
<style>
body{font-family:Arial;background:#eef5fc;margin:0}
.container{max-width:900px;margin:20px auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
input,select,button{padding:10px;margin:5px}
button{border:none;border-radius:5px;color:#fff;cursor:pointer}
.blue{background:#1976d2}.gray{background:#607d8b}.red{background:#f44336}
.green{background:#4caf50}.orange{background:#ff9800}.purple{background:#673ab7}
.card{border:1px solid #ddd;border-left:5px solid #1976d2;border-radius:8px;padding:12px;margin:12px 0}
@media print{
.controls,button{display:none!important}
body{background:#fff}
.container{box-shadow:none;margin:0}
}
</style>
</head>
<body>
<div class="container">
<h1>🏥 Smart Health System</h1>

<div class="controls">
<input id="searchDoctor" placeholder="Search Doctor">
<button class="blue" onclick="searchAppointment()">Search</button>
<button class="gray" onclick="displayAppointments()">Show All</button>

<select id="statusFilter" onchange="filterStatus()">
<option>All</option><option>Pending</option><option>Confirmed</option>
<option>Completed</option><option>Cancelled</option>
</select>

<select id="sortOption" onchange="sortAppointments()">
<option value="none">Sort</option>
<option value="az">Doctor A-Z</option>
<option value="za">Doctor Z-A</option>
<option value="new">Newest</option>
<option value="old">Oldest</option>
</select>

<button class="red" onclick="clearHistory()">Clear</button>
<button class="green" onclick="location.href='dashboard.html'">Dashboard</button>
</div>

<h3 id="count"></h3>
<div id="summary"></div>

<p>
<button class="blue" onclick="downloadReport()">📥 Download Report</button>
<button class="gray" onclick="printReport()">🖨 Print Report</button>
</p>

<div id="history"></div>
</div>

<script>
function getAppointments(){return JSON.parse(localStorage.getItem("appointments"))||[];}
function saveAppointments(a){localStorage.setItem("appointments",JSON.stringify(a));}

function updateSummary(list){
let p=0,c=0,co=0,x=0;
list.forEach(a=>{
if(a.status=="Pending")p++;
else if(a.status=="Confirmed")c++;
else if(a.status=="Completed")co++;
else if(a.status=="Cancelled")x++;
});
count.innerHTML="<b>Total Appointments : "+list.length+"</b>";
summary.innerHTML=`Pending : ${p}<br>Confirmed : ${c}<br>Completed : ${co}<br>Cancelled : ${x}`;
}

function render(list){
updateSummary(list);
if(!list.length){history.innerHTML="<p>No Appointments Found</p>";return;}
let out="";
list.forEach((a,i)=>{
out+=`<div class="card">
<p><b>Doctor:</b> ${a.doctor}</p>
<p><b>Department:</b> ${a.department}</p>
<p><b>Date:</b> ${a.date}</p>
<p><b>Time:</b> ${a.time}</p>
<p><b>Status:</b> ${a.status}</p>
<button class="orange" onclick="editAppointment(${i})">Edit</button>
<button class="purple" onclick="changeStatus(${i})">Status</button>
<button class="red" onclick="deleteAppointment(${i})">Delete</button>
</div>`;
});
history.innerHTML=out;
}

function displayAppointments(){render(getAppointments());}
function searchAppointment(){
let s=searchDoctor.value.toLowerCase();
render(getAppointments().filter(a=>a.doctor.toLowerCase().includes(s)));
}
function filterStatus(){
let f=statusFilter.value;
let a=getAppointments();
if(f!="All")a=a.filter(x=>x.status==f);
render(a);
}
function sortAppointments(){
let a=getAppointments();
switch(sortOption.value){
case"az":a.sort((x,y)=>x.doctor.localeCompare(y.doctor));break;
case"za":a.sort((x,y)=>y.doctor.localeCompare(x.doctor));break;
case"new":a.sort((x,y)=>new Date(y.date)-new Date(x.date));break;
case"old":a.sort((x,y)=>new Date(x.date)-new Date(y.date));break;
}
render(a);
}
function editAppointment(i){localStorage.setItem("editIndex",i);location.href="appointment.html";}
function changeStatus(i){
let a=getAppointments();
let s=prompt("Enter Status",a[i].status);
if(!s)return;
a[i].status=s;
saveAppointments(a);
displayAppointments();
}
function deleteAppointment(i){
if(confirm("Delete appointment?")){
let a=getAppointments();a.splice(i,1);saveAppointments(a);displayAppointments();
}}
function clearHistory(){
if(confirm("Clear all appointments?")){
localStorage.removeItem("appointments");
displayAppointments();
}}
function downloadReport(){
let txt="SMART HEALTH SYSTEM\n\n";
getAppointments().forEach((a,n)=>{
txt+=`Appointment ${n+1}\nDoctor: ${a.doctor}\nDepartment: ${a.department}\nDate: ${a.date}\nTime: ${a.time}\nStatus: ${a.status}\n-------------------------\n`;
});
let blob=new Blob([txt],{type:"text/plain"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="Appointment_Report.txt";
link.click();
}
function printReport(){
let a=getAppointments();
let w=window.open("","");
let h=`<html><head><title>Appointment Report</title>
<style>body{font-family:Arial;padding:20px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #000;padding:8px}th{background:#1976d2;color:#fff}</style>
</head><body><h1>Smart Health System</h1><table>
<tr><th>Doctor</th><th>Department</th><th>Date</th><th>Time</th><th>Status</th></tr>`;
a.forEach(x=>{h+=`<tr><td>${x.doctor}</td><td>${x.department}</td><td>${x.date}</td><td>${x.time}</td><td>${x.status}</td></tr>`;});
h+="</table></body></html>";
w.document.write(h);w.document.close();w.focus();setTimeout(()=>{w.print();w.close();},300);
}
window.onload=displayAppointments;
</script>
</body>
</html>
