<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-container">

        <h1>🏥 Smart Health System</h1>

        <p class="welcome" id="title">Book Appointment</p>

        <form>

            <label>Select Doctor</label>

            <select id="doctor">
                <option value="">Select Doctor</option>
                <option>Dr. Kumar</option>
                <option>Dr. Ravi</option>
                <option>Dr. Priya</option>
                <option>Dr. Meena</option>
            </select>

            <label>Department</label>

            <select id="department">
                <option value="">Select Department</option>
                <option>Cardiology</option>
                <option>Neurology</option>
                <option>Orthopedics</option>
                <option>General Medicine</option>
            </select>

            <label>Date</label>
            <input type="date" id="date">

            <label>Time</label>
            <input type="time" id="time">

            <button type="button" onclick="bookAppointment()">
                Save Appointment
            </button>

        </form>

        <br>

        <button type="button" onclick="window.location.href='dashboard.html'">
            Back to Dashboard
        </button>

    </div>

    <script>

        let editIndex = localStorage.getItem("editIndex");

        if (editIndex !== null) {

            document.getElementById("title").innerHTML =
                "Edit Appointment";

            let appointments =
                JSON.parse(localStorage.getItem("appointments")) || [];

            let appointment = appointments[editIndex];

            window.onload = function () {

                document.getElementById("doctor").value =
                    appointment.doctor;

                document.getElementById("department").value =
                    appointment.department;

                document.getElementById("date").value =
                    appointment.date;

                document.getElementById("time").value =
                    appointment.time;

            };

        }

        function bookAppointment() {

            let doctor =
                document.getElementById("doctor").value;

            let department =
                document.getElementById("department").value;

            let date =
                document.getElementById("date").value;

            let time =
                document.getElementById("time").value;

            if (doctor === "") {
                alert("Please select doctor");
                return;
            }

            if (department === "") {
                alert("Please select department");
                return;
            }

            if (date === "") {
                alert("Please select date");
                return;
            }

            if (time === "") {
                alert("Please select time");
                return;
            }

            let appointment = {

                doctor: doctor,
                department: department,
                date: date,
                time: time

            };

            let appointments =
                JSON.parse(localStorage.getItem("appointments")) || [];

            if (editIndex !== null) {

                appointments[editIndex] = appointment;

                localStorage.removeItem("editIndex");

                alert("Appointment Updated Successfully");

            } else {

                appointments.push(appointment);

                alert("Appointment Booked Successfully");

            }

            localStorage.setItem(
                "appointments",
                JSON.stringify(appointments)
            );

            window.location.href = "history.html";

        }

    </script>

</body>

</html>
