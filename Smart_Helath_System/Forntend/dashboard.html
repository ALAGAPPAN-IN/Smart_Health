<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Health System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-container">

        <h1>🏥 Smart Health System</h1>

        <p class="welcome" id="welcome"></p>

        <h2>Dashboard Statistics</h2>

        <h3 id="total"></h3>

        <h3 id="pending"></h3>

        <h3 id="confirmed"></h3>

        <h3 id="completed"></h3>

        <h3 id="cancelled"></h3>

        <h2>🔔 Upcoming Appointment</h2>

        <div id="upcoming" class="upcoming-card">

            No Upcoming Appointment

        </div>

        <br>

        <button onclick="window.location.href='appointment.html'">
            Book Appointment
        </button>

        <button onclick="window.location.href='history.html'">
            View History
        </button>

        <button onclick="window.location.href='profile.html'">
            My Profile
        </button>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>

    </div>

<script>

// ---------------- Welcome ----------------

let userName = localStorage.getItem("loggedInUser");

if(userName){

    document.getElementById("welcome").innerHTML =
    "Welcome " + userName;

}
else{

    document.getElementById("welcome").innerHTML =
    "Welcome Guest";

}

// ---------------- Appointment Statistics ----------------

let appointments =
JSON.parse(localStorage.getItem("appointments")) || [];

let total = appointments.length;

let pending = 0;
let confirmed = 0;
let completed = 0;
let cancelled = 0;

for(let i=0;i<appointments.length;i++){

    if(appointments[i].status=="Pending"){

        pending++;

    }

    else if(appointments[i].status=="Confirmed"){

        confirmed++;

    }

    else if(appointments[i].status=="Completed"){

        completed++;

    }

    else if(appointments[i].status=="Cancelled"){

        cancelled++;

    }

}

document.getElementById("total").innerHTML =
"📋 Total Appointments : " + total;

document.getElementById("pending").innerHTML =
"🟡 Pending : " + pending;

document.getElementById("confirmed").innerHTML =
"🟢 Confirmed : " + confirmed;

document.getElementById("completed").innerHTML =
"🔵 Completed : " + completed;

document.getElementById("cancelled").innerHTML =
"🔴 Cancelled : " + cancelled;


// ---------------- Upcoming Appointment ----------------

let upcoming = "";

if(appointments.length>0){

    let nextAppointment = appointments[0];

    for(let i=1;i<appointments.length;i++){

        if(appointments[i].date < nextAppointment.date){

            nextAppointment = appointments[i];

        }

    }

    let badge="";

    if(nextAppointment.status=="Pending"){

        badge =
        "<span class='pending'>Pending</span>";

    }

    else if(nextAppointment.status=="Confirmed"){

        badge =
        "<span class='confirmed'>Confirmed</span>";

    }

    else if(nextAppointment.status=="Completed"){

        badge =
        "<span class='completed'>Completed</span>";

    }

    else{

        badge =
        "<span class='cancelled'>Cancelled</span>";

    }

    upcoming =

    "<p><b>Doctor :</b> "
    + nextAppointment.doctor +
    "</p>" +

    "<p><b>Department :</b> "
    + nextAppointment.department +
    "</p>" +

    "<p><b>Date :</b> "
    + nextAppointment.date +
    "</p>" +

    "<p><b>Time :</b> "
    + nextAppointment.time +
    "</p>" +

    "<p><b>Status :</b> "
    + badge +
    "</p>";

}
else{

    upcoming =
    "No Upcoming Appointment";

}

document.getElementById("upcoming").innerHTML =
upcoming;


// ---------------- Logout ----------------

function logout(){

    localStorage.removeItem("loggedInUser");

    alert("Logged Out Successfully");

    window.location.href="login.html";

}

</script>

</body>

</html>
